<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home - Ziptrii (BETA)</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

    <!-- 1. TOP NAVIGATION BAR -->
    <header class="top-nav">
        <div class="nav-left">
            <div class="logo">Ziptrii</div>
            <nav class="nav-links">
                <a href="#" class="active">Discover</a>
                <a href="#">Avatar Shop</a>
                <a href="#">Create</a>
                <a href="#">Robux</a>
            </nav>
        </div>
        <div class="nav-right">
            <span class="robux-balance">0 <span class="robux-icon">R$</span></span>
            <div class="user-pill">Username</div>
        </div>
    </header>

    <div class="main-layout">
        <!-- 2. LEFT SIDEBAR (Hidden on mobile back in 2020) -->
        <aside class="left-sidebar">
            <a href="#" class="sidebar-item active">Home</a>
            <a href="#" class="sidebar-item">Profile</a>
            <a href="#" class="sidebar-item">Messages</a>
            <a href="#" class="sidebar-item">Friends</a>
            <a href="#" class="sidebar-item">Inventory</a>
            <a href="#" class="sidebar-item">Trade</a>
        </aside>

        <!-- 3. MAIN CONTENT CONTAINER -->
        <main class="content">
            <!-- User Header Banner -->
            <section class="user-header">
                <div class="avatar-thumbnail"></div>
                <h1>Hello, <span class="display-name">Display_Name</span></h1>
            </section>

            <!-- Game Sort Row: Recently Played -->
            <section class="game-sort">
                <div class="sort-header">
                    <h2>Recently Played</h2>
                    <a href="#" class="see-all">See All</a>
                </div>
                <div class="game-grid">
                    <!-- Game Card Sample -->
                    <div class="game-card">
                        <div class="game-icon-container">
                            <div class="game-icon-placeholder"></div>
                        </div>
                        <div class="game-title">Crossroads [2020]</div>
                        <div class="game-stats">
                            <span class="rating">👍 94%</span>
                            <span class="playing">👥 1.2K</span>
                        </div>
                    </div>
                    <!-- Repeat cards as needed -->
                </div>
            </section>
        </main>
    </div>

</body>
</html>
